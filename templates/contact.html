{% extends "base.html" %}

{% block content %}

<section class="bg-gray-100 py-28 px-6">

    <div class="max-w-6xl mx-auto">

        <div class="text-center mb-16">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">
                Get In Touch
            </h1>
            <p class="text-gray-600">
                Whether you have an opportunity, a question, or just want to connect — feel free to reach out.
            </p>
        </div>

        <!-- Contact Layout -->
        <div class="grid md:grid-cols-2 gap-16">

            <!-- Contact Form -->
            <div class="bg-white p-10 rounded-3xl shadow-lg border">

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="mb-6 p-4 rounded-lg bg-green-100 text-green-800">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST" class="space-y-6">

                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            Name
                        </label>
                        <input type="text" name="name" required
                               class="w-full p-3 border border-gray-300 rounded-lg
                                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            Email
                        </label>
                        <input type="email" name="email" required
                               class="w-full p-3 border border-gray-300 rounded-lg
                                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            Message
                        </label>
                        <textarea name="message" rows="5" required
                                  class="w-full p-3 border border-gray-300 rounded-lg
                                         focus:outline-none focus:ring-2 focus:ring-blue-500 transition"></textarea>
                    </div>

                    <button type="submit"
                            class="w-full py-3 bg-gray-900 text-white rounded-lg
                                   hover:bg-gray-700 hover:scale-[1.02] active:scale-95
                                   transition-all duration-300 shadow-md hover:shadow-xl">
                        Send Message
                    </button>

                </form>

            </div>

            <!-- Contact Icons (Color on Hover Only) -->
            <div class="flex flex-col justify-center items-center space-y-10">

                <h3 class="text-2xl font-semibold text-gray-900">
                    Connect With Me
                </h3>

                <div class="flex gap-10 text-4xl text-gray-600">

                    <!-- Email -->
                    <a href="mailto:sri2006karthik@gmail.com"
                    class="hover:scale-110 hover:-translate-y-1 transition-all duration-300 hover:text-red-500">
                        <i class="fa-solid fa-envelope"></i>
                    </a>

                    <!-- LinkedIn -->
                    <a href="https://www.linkedin.com/in/sri-karthik-b-060106324/"
                    target="_blank"
                    class="hover:scale-110 hover:-translate-y-1 transition-all duration-300 hover:text-[#0A66C2]">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>

                    <!-- Instagram -->
                    <a href="https://instagram.com/karthik__616"
                    target="_blank"
                    class="hover:scale-110 hover:-translate-y-1 transition-all duration-300 hover:text-pink-500">
                        <i class="fa-brands fa-instagram"></i>
                    </a>

                    <!-- Phone -->
                    <a href="tel:+916309121289"
                    class="hover:scale-110 hover:-translate-y-1 transition-all duration-300 hover:text-green-600">
                        <i class="fa-solid fa-phone"></i>
                    </a>

                </div>

            </div>

    </div>

</section>

{% endblock %}
