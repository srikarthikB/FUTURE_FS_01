<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sri Karthik Portfolio</title>

    <!-- Devicons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon"
          href="{{ url_for('static', filename='images/projects/portfolio_favicon.png') }}">

    <!-- SEO -->
    <meta name="description" content="Sri Karthik - Backend Developer Portfolio. Flask, Python, and modern web technologies.">
    <meta name="keywords" content="Sri Karthik, Backend Developer, Flask, Python, Portfolio">
    <meta name="author" content="Sri Karthik">

    <!-- Open Graph -->
    <meta property="og:title" content="Sri Karthik Portfolio">
    <meta property="og:description" content="Backend Developer building scalable web applications.">
    <meta property="og:type" content="website">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Page Entrance Animation */
        #page-wrapper {
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            filter: blur(10px);
            animation: smoothEntrance 0.9s cubic-bezier(.22,1,.36,1) forwards;
        }

        @keyframes smoothEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Background Gradient Animation */
        body {
            background: linear-gradient(-45deg, #0f172a, #111827, #0a0f1f, #0f172a);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav id="navbar"
         class="flex justify-between items-center px-6 py-4 
                fixed top-0 w-full 
                backdrop-blur-md bg-gray-900/70 
                text-white z-50 transition-all duration-300">

        <!-- Logo -->
        <a href="{{ url_for('home') }}"
           class="text-xl font-bold tracking-wide hover:text-blue-400 transition">
            Sri Karthik B
        </a>

        <!-- Nav Links -->
        <ul class="flex space-x-6">

            <li>
                <a href="{{ url_for('home') }}"
                   class="relative group px-3 py-2 text-gray-300 hover:text-white transition
                          {% if request.path == url_for('home') %} text-white {% endif %}">
                    Home
                    <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-blue-500
                                 transition-all duration-300 group-hover:w-full
                                 {% if request.path == url_for('home') %} w-full {% endif %}">
                    </span>
                </a>
            </li>

            <li>
                <a href="{{ url_for('about') }}"
                   class="relative group px-3 py-2 text-gray-300 hover:text-white transition
                          {% if request.path == url_for('about') %} text-white {% endif %}">
                    About
                    <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-blue-500
                                 transition-all duration-300 group-hover:w-full
                                 {% if request.path == url_for('about') %} w-full {% endif %}">
                    </span>
                </a>
            </li>

            <li>
                <a href="{{ url_for('projects') }}"
                   class="relative group px-3 py-2 text-gray-300 hover:text-white transition
                          {% if request.path == url_for('projects') %} text-white {% endif %}">
                    Projects
                    <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-blue-500
                                 transition-all duration-300 group-hover:w-full
                                 {% if request.path == url_for('projects') %} w-full {% endif %}">
                    </span>
                </a>
            </li>

            <li>
                <a href="{{ url_for('contact') }}"
                   class="relative group px-3 py-2 text-gray-300 hover:text-white transition
                          {% if request.path == url_for('contact') %} text-white {% endif %}">
                    Contact
                    <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-blue-500
                                 transition-all duration-300 group-hover:w-full
                                 {% if request.path == url_for('contact') %} w-full {% endif %}">
                    </span>
                </a>
            </li>

        </ul>
    </nav>

    <!-- Noise Texture -->
    <div class="fixed inset-0 pointer-events-none opacity-3 mix-blend-overlay"
         style="background-image: url('https://www.transparenttextures.com/patterns/noise.png');">
    </div>

    <!-- Page Content -->
    <div id="page-wrapper" class="relative z-10 pt-20">
        {% block content %}{% endblock %}
    </div>

    <!-- STEP 4: Shadow On Scroll -->
    <script>
        window.addEventListener("scroll", function() {
            const nav = document.getElementById("navbar");
            if (window.scrollY > 40) {
                nav.classList.add("shadow-2xl");
            } else {
                nav.classList.remove("shadow-2xl");
            }
        });
    </script>

</body>
</html>
